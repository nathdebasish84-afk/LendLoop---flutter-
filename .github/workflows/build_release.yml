name: Build Android Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Delete broken Android folder
        run: rm -rf android

      - name: Regenerate Android folder
        run: |
          flutter create --project-name lendloop --org com.example temp_project
          cp -r temp_project/android .
          rm -rf temp_project
        
      - name: Fix Kotlin stdlib conflict
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.8.22"/' android/build.gradle
          find android -name "*.gradle" -exec sed -i 's/kotlin-stdlib-jdk7/kotlin-stdlib/g' {} \;
          find android -name "*.gradle" -exec sed -i 's/kotlin-stdlib-jdk8/kotlin-stdlib/g' {} \;

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
