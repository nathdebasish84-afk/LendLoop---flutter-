name: lendloop
description: A new Flutter project to track lent and borrowed items.
version: 1.0.0+1

environment:
  sdk: '^3.4.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_local_notifications: ^17.1.2
  csv: ^6.0.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  google_fonts: ^6.2.1
  timezone: ^0.9.4
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
